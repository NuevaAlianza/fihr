<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Examenes · Santo Cura de Ars</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --az:#1B3A6B;--az2:#DCE8F5;--ve:#1B5E20;--ve2:#E8F5E9;
  --am:#7B5800;--am2:#FFF8DC;--ro:#B71C1C;--ro2:#FFEBEE;
  --bg:#F0F4F8;--card:#fff;--txt:#1A1A1A;--sub:#555;--brd:#E0E0E0;
  --warn:#E65100;--warn2:#FFF3E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
nav{background:var(--az);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.nav-title{font-size:16px;font-weight:700;flex:1}
.nav-sub{font-size:12px;opacity:.7;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#timer-display{background:rgba(255,255,255,.15);border-radius:6px;padding:4px 12px;font-size:15px;font-weight:700;letter-spacing:.05em;display:none}
#timer-display.warn{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.main{max-width:820px;margin:0 auto;padding:20px 14px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--brd);padding:22px;margin-bottom:14px}
h2{font-size:17px;font-weight:700;color:var(--az);margin-bottom:12px}
label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:4px;margin-top:10px}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;border:1.5px solid var(--brd);border-radius:8px;padding:10px 12px;
  font-size:15px;font-family:Arial,sans-serif;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--az)}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--az);color:#fff}.btn-primary:hover{background:#15305A}
.btn-success{background:var(--ve);color:#fff}.btn-success:hover{background:#145218}
.btn-danger{background:var(--ro);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-outline{background:transparent;color:var(--az);border:1.5px solid var(--az)}.btn-outline:hover{background:var(--az2)}
.btn-gray{background:#ECEFF1;color:#37474F;border:none}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-on{background:var(--ve2);color:var(--ve)}
.badge-off{background:var(--ro2);color:var(--ro)}
.badge-gray{background:#ECEFF1;color:#37474F}
.badge-am{background:var(--am2);color:var(--am)}
/* Questions */
.pregunta-card{background:#fff;border:1.5px solid var(--brd);border-radius:10px;padding:18px;margin-bottom:12px}
.pregunta-num{display:inline-flex;align-items:center;justify-content:center;background:var(--az);color:#fff;border-radius:50%;width:26px;height:26px;font-size:13px;font-weight:700;margin-right:8px;flex-shrink:0}
.pregunta-header{display:flex;align-items:flex-start;margin-bottom:12px}
.pregunta-txt{font-size:15px;font-weight:700;line-height:1.5;flex:1}
.pts-badge{flex-shrink:0;font-size:11px;background:var(--am2);color:var(--am);border-radius:4px;padding:2px 7px;font-weight:700;margin-left:8px}
.op-list{display:flex;flex-direction:column;gap:7px}
.op-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:8px;cursor:pointer;background:#fff;font-size:14px;width:100%;text-align:left}
.op-btn:hover{border-color:var(--az);background:var(--az2)}
.op-btn.selected{border-color:var(--az);background:var(--az2);font-weight:700;border-width:2.5px}
.op-letra{width:26px;height:26px;border-radius:50%;background:var(--az);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.vf-row{display:flex;gap:10px}
.vf-btn{flex:1;padding:12px;border:1.5px solid var(--brd);border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;text-align:center;background:#fff}
.vf-btn:hover{border-color:var(--az);background:var(--az2)}
.vf-btn.sel-v{border-color:#185FA5;background:#DCE8F5;color:#0C447C}
.vf-btn.sel-f{border-color:#854F0B;background:#FAEEDA;color:#633806}
.completar-txt{font-size:15px;line-height:2.4}
.blank-input{border:none;border-bottom:2px solid var(--az);background:transparent;font-size:15px;padding:2px 4px;width:130px;text-align:center;color:var(--az);font-weight:700;font-family:Arial,sans-serif}
.blank-input:focus{outline:none;border-bottom-color:var(--ve)}
.orden-list{display:flex;flex-direction:column;gap:6px}
.orden-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--brd);border-radius:8px;background:#fff;cursor:grab;user-select:none}
.orden-item:hover{border-color:var(--az);background:var(--az2)}
.orden-item.dragging{opacity:.35;border-style:dashed}
.orden-item.dragover{border-color:var(--ve);background:var(--ve2)}
.orden-handle{color:#bbb;font-size:18px}
.orden-pos{width:22px;height:22px;border-radius:50%;background:var(--az);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.escala-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.escala-btn{flex:1;min-width:46px;padding:10px 4px;border:1.5px solid var(--brd);border-radius:8px;text-align:center;cursor:pointer;background:#fff}
.escala-btn:hover{border-color:var(--az);background:var(--az2)}
.escala-btn.selected{border-color:var(--az);background:var(--az);color:#fff}
.escala-num{font-size:18px;font-weight:700}
.escala-lbl{font-size:11px;margin-top:2px}
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:18px}
.progress-fill{height:100%;background:var(--az);border-radius:3px;transition:width .3s}
.secure-area{position:relative}
.secure-icon{position:absolute;top:8px;right:10px;font-size:11px;color:#aaa;background:#f5f5f5;border-radius:4px;padding:2px 6px;pointer-events:none}
.secure-area textarea{padding-right:76px}
/* Admin */
.exam-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.exam-row:last-child{border-bottom:none}
.exam-info{flex:1;min-width:160px}
.exam-name{font-weight:700;font-size:14px}
.exam-meta{font-size:12px;color:var(--sub);margin-top:2px}
.toggle-btn{width:50px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.toggle-btn.on{background:var(--ve)}.toggle-btn.off{background:#ccc}
.toggle-knob{position:absolute;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s}
.toggle-btn.on .toggle-knob{left:27px}.toggle-btn.off .toggle-knob{left:3px}
.sec-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.sec-chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--brd);background:#fff}
.sec-chip.active{background:var(--az);color:#fff;border-color:var(--az)}
.form-sec{border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:12px}
.form-sec-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.q-builder{border:1px solid #C5D5E8;border-radius:8px;padding:12px;margin-bottom:8px;background:#FAFBFF}
.q-type-pill{display:inline-block;background:var(--az2);color:var(--az);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.remove-q{float:right;background:var(--ro2);color:var(--ro);border:none;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;font-weight:700}
/* Lista estudiantes */
.est-table{width:100%;border-collapse:collapse;font-size:13px}
.est-table th{background:var(--az);color:#fff;padding:7px 10px;text-align:left;font-size:12px}
.est-table td{padding:7px 10px;border-bottom:1px solid var(--brd)}
.est-table tr:hover td{background:var(--az2)}
/* Tabs admin */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--az2);margin-bottom:18px}
.admin-tab{padding:8px 16px;cursor:pointer;font-size:14px;font-weight:700;color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px}
.admin-tab.active{color:var(--az);border-bottom-color:var(--az)}
/* Archive indicator */
.archived-row{background:#FFFDE7}
/* Enviado */
.enviado-box{text-align:center;padding:36px 16px}
.enviado-icon{font-size:52px;margin-bottom:12px}
.enviado-title{font-size:22px;font-weight:700;color:var(--ve);margin-bottom:8px}
/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--az);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;
  font-weight:700;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#copy-toast{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:var(--warn);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;
  font-weight:700;z-index:9999;pointer-events:none}
/* info box */
.info-box{background:var(--az2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--az);margin-bottom:12px}
.warn-box{background:var(--warn2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--warn)}
.success-box{background:var(--ve2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--ve)}
@media(max-width:600px){
  .op-btn{font-size:13px}.vf-row{flex-direction:column}.escala-btn{min-width:38px}
  nav{gap:6px}
}
</style>
</head>
<body>
<div id="copy-toast">Escribe tu respuesta — no se puede pegar</div>
<nav>
  <div class="nav-title">Examenes · Santo Cura de Ars</div>
  <span class="nav-sub" id="nav-sub"></span>
  <div id="timer-display"></div>
  <button class="btn btn-sm" id="btn-admin"
    style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)"
    onclick="showAdminLogin()">Admin</button>
</nav>
<div class="main" id="main-content"></div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://uazurfbmrnsadkrxutpo.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhenVyZmJtcm5zYWRrcnh1dHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE2NTY0NzEsImV4cCI6MjA2NzIzMjQ3MX0.GmBk4XRX0gVhw20gTGX8jM58mb2gXOFC7qkY8iMEU9k';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const SECCIONES = ['A','B','C','D','E'];

const S = {
  view:'inicio', examenes:[], examen:null,
  est:{nombre:'',orden:0,grado:'',seccion:''},
  resp:{}, ordenItems:{},
  timerSec:0, timerStart:0, timerInterval:null,
  adminAuth:false, adminTab:'examenes',
  adminExamen:null, respuestas:[], listaEst:[],
  qBuilders:[]
};

// ── SECURITY ──────────────────────────────────────────────────
document.addEventListener('copy', e=>{
  if(S.adminAuth) return;
  e.preventDefault(); showCopyToast();
});
document.addEventListener('contextmenu', e=>{
  if(S.adminAuth) return;
  e.preventDefault(); showCopyToast();
});
function showCopyToast(){
  const el=document.getElementById('copy-toast');
  el.style.display='block';
  clearTimeout(window._cpt);
  window._cpt=setTimeout(()=>el.style.display='none',2500);
}
function secureEl(el){
  if(!el) return;
  el.addEventListener('paste', e=>{ e.preventDefault(); showCopyToast(); });
  el.addEventListener('drop', e=>e.preventDefault());
  el.addEventListener('contextmenu', e=>e.preventDefault());
}

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg,ms=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),ms);
}

// ── TIMER ──────────────────────────────────────────────────────
function startTimer(min){
  S.timerSec=min*60; S.timerStart=Date.now();
  const d=document.getElementById('timer-display');
  d.style.display='block';
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    const rem=Math.max(0,S.timerSec-Math.floor((Date.now()-S.timerStart)/1000));
    const m=Math.floor(rem/60), s=rem%60;
    d.textContent=m+':'+(s<10?'0':'')+s;
    if(rem<=300) d.classList.add('warn'); else d.classList.remove('warn');
    if(rem===0){ clearInterval(S.timerInterval); submitExamen(true); }
  },500);
}
function stopTimer(){
  clearInterval(S.timerInterval);
  document.getElementById('timer-display').style.display='none';
}
function tiempoUsado(){ return S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0; }

// ── UTILS ──────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function normalizeName(s){ return String(s||'').toLowerCase().trim().replace(/\s+/g,' '); }
function render(){
  switch(S.view){
    case 'inicio':      renderInicio(); break;
    case 'registro':    renderRegistro(); break;
    case 'examen':      renderExamen(); break;
    case 'enviado':     renderEnviado(); break;
    case 'admin-login': renderAdminLogin(); break;
    case 'admin':       renderAdmin(); break;
    case 'admin-crear': renderAdminCrear(); break;
    case 'admin-resp':  renderAdminResp(); break;
  }
}

// ── INICIO ─────────────────────────────────────────────────────
async function renderInicio(){
  document.getElementById('nav-sub').textContent='';
  const {data}=await sb.from('examenes')
    .select('id,titulo,descripcion,grado,periodo,tiempo_minutos,activo,secciones_activas,validar_lista')
    .eq('activo',true).order('created_at',{ascending:false});
  S.examenes=data||[];
  let html='<div class="card">';
  if(S.examenes.length===0){
    html+='<div style="text-align:center;padding:40px 0;color:var(--sub)"><div style="font-size:40px;margin-bottom:12px">&#128197;</div><div style="font-size:16px;font-weight:700">No hay examenes activos</div><div style="font-size:13px;margin-top:6px">Consulta con tu docente.</div></div>';
  } else {
    html+='<h2>Examenes disponibles</h2>';
    S.examenes.forEach(ex=>{
      const secs=(ex.secciones_activas||[]);
      const secsLabel=secs.length>0?'Secciones: '+secs.join(', '):'Todas las secciones';
      html+=`<div class="exam-row">
        <div class="exam-info">
          <div class="exam-name">${esc(ex.titulo)}</div>
          <div class="exam-meta">${esc(ex.grado)} · Periodo ${ex.periodo} · ${secsLabel}${ex.tiempo_minutos>0?' · '+ex.tiempo_minutos+' min':''}</div>
          ${ex.validar_lista?'<div style="font-size:11px;color:var(--ve);margin-top:2px">Verificacion de lista activa</div>':''}
        </div>
        <button class="btn btn-primary" onclick="iniciarExamen('${ex.id}')">Comenzar</button>
      </div>`;
    });
  }
  html+='</div>';
  document.getElementById('main-content').innerHTML=html;
}

// ── REGISTRO ───────────────────────────────────────────────────
async function iniciarExamen(id){
  const {data,error}=await sb.from('examenes').select('*').eq('id',id).single();
  if(error||!data||!data.activo){toast('Examen no disponible');return;}
  S.examen=data; S.resp={}; S.ordenItems={};
  S.view='registro'; render();
}

function renderRegistro(){
  const ex=S.examen;
  document.getElementById('nav-sub').textContent=ex.titulo;
  const secs=(ex.secciones_activas||[]);
  const secOptions=secs.length>0
    ? secs.map(s=>`<option value="${s}">${s}</option>`).join('')
    : SECCIONES.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('main-content').innerHTML=`
  <div class="card" style="max-width:500px;margin:0 auto">
    <h2>${esc(ex.titulo)}</h2>
    ${ex.descripcion?`<div style="color:var(--sub);font-size:14px;margin-bottom:12px">${esc(ex.descripcion)}</div>`:''}
    ${ex.instrucciones?`<div class="info-box"><strong>Instrucciones:</strong> ${esc(ex.instrucciones)}</div>`:''}
    ${ex.validar_lista?'<div class="warn-box">Tu nombre y numero seran verificados contra la lista del curso. Escribe exactamente como aparece en tu lista.</div>':''}
    <label for="r-nombre">Nombre completo *</label>
    <div class="secure-area">
      <input type="text" id="r-nombre" maxlength="80" placeholder="Escribe tu nombre completo" autocomplete="off">
      <span class="secure-icon">sin pegar</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div>
        <label for="r-orden">Numero de orden *</label>
        <input type="number" id="r-orden" min="1" max="50" placeholder="Ej: 12">
      </div>
      <div>
        <label for="r-seccion">Seccion *</label>
        <select id="r-seccion"><option value="">-- Selecciona --</option>${secOptions}</select>
      </div>
    </div>
    <label for="r-grado">Grado *</label>
    <select id="r-grado">
      <option value="">-- Selecciona --</option>
      <option value="2do">2do Grado</option>
      <option value="4to">4to Grado</option>
      <option value="5to">5to Grado</option>
      <option value="6to">6to Grado</option>
    </select>
    <div id="reg-error" style="display:none" class="warn-box" style="margin-top:10px"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="S.view='inicio';render()">Volver</button>
      <button class="btn btn-primary" id="btn-comenzar" onclick="confirmarRegistro()">Comenzar examen</button>
    </div>
  </div>`;
  secureEl(document.getElementById('r-nombre'));
}

async function confirmarRegistro(){
  const nombre=document.getElementById('r-nombre').value.trim();
  const orden=parseInt(document.getElementById('r-orden').value)||0;
  const seccion=document.getElementById('r-seccion').value;
  const grado=document.getElementById('r-grado').value;
  const errEl=document.getElementById('reg-error');
  const btn=document.getElementById('btn-comenzar');
  function showErr(msg){errEl.style.display='block';errEl.textContent=msg;}
  errEl.style.display='none';
  if(!nombre||!seccion||!grado||orden<1){showErr('Completa todos los campos correctamente.');return;}
  btn.disabled=true; btn.textContent='Verificando...';

  // Check section restriction
  const secs=S.examen.secciones_activas||[];
  if(secs.length>0 && !secs.includes(seccion)){
    showErr('Este examen no esta habilitado para la seccion '+seccion+'. Secciones autorizadas: '+secs.join(', '));
    btn.disabled=false; btn.textContent='Comenzar examen'; return;
  }

  // Check student list if required
  if(S.examen.validar_lista){
    const {data:estFound}=await sb.from('estudiantes_lista')
      .select('id,nombre,numero_orden').eq('grado',grado).eq('seccion',seccion)
      .eq('numero_orden',orden).eq('activo',true);
    if(!estFound||estFound.length===0){
      showErr('El numero '+orden+' no esta registrado en la lista de '+grado+' seccion '+seccion+'. Verifica con tu docente.');
      btn.disabled=false; btn.textContent='Comenzar examen'; return;
    }
    const match=estFound.find(e=>normalizeName(e.nombre).includes(normalizeName(nombre).split(' ')[0])||normalizeName(nombre).includes(normalizeName(e.nombre).split(' ')[0]));
    if(!match){
      showErr('El nombre no coincide con el numero '+orden+' en la lista. Nombre esperado: '+estFound[0].nombre);
      btn.disabled=false; btn.textContent='Comenzar examen'; return;
    }
  }

  // Check duplicate submission
  const {data:dup}=await sb.from('respuestas_examenes').select('id')
    .eq('examen_id',S.examen.id).eq('numero_orden',orden).eq('seccion',seccion).eq('grado',grado).limit(1);
  if(dup&&dup.length>0){
    showErr('Ya hay una respuesta registrada para el numero '+orden+' de la seccion '+seccion+'. Solo se permite un envio por estudiante.');
    btn.disabled=false; btn.textContent='Comenzar examen'; return;
  }

  S.est={nombre,orden,grado,seccion};
  S.view='examen';
  S.currentQ=0;
  (S.examen.preguntas||[]).forEach((q,i)=>{ if(q.tipo==='ordenar') S.ordenItems[i]=[...q.items]; });
  render();
  if(S.examen.tiempo_minutos>0) startTimer(S.examen.tiempo_minutos);
}

// ── EXAMEN ─────────────────────────────────────────────────────
function renderExamen(){
  const qs=S.examen.preguntas||[];
  if(S.currentQ===undefined) S.currentQ=0;
  const qi=Math.min(S.currentQ, qs.length-1);
  const resp_count=Object.keys(S.resp).length;
  document.getElementById('nav-sub').textContent=S.est.nombre+' · '+S.est.seccion;
  const pct=qs.length>0?Math.round(resp_count/qs.length*100):0;

  // Navigator dots
  let navDots=qs.map((_,i)=>{
    const ans=S.resp[i]!==undefined&&S.resp[i]!==null&&S.resp[i]!=='';
    const active=i===qi;
    let bg=active?'#1B3A6B':(ans?'#1B5E20':'#ccc');
    return `<div onclick="goToQ(${i})" style="width:${active?'28px':'10px'};height:10px;border-radius:5px;background:${bg};cursor:pointer;transition:.2s;flex-shrink:0"></div>`;
  }).join('');

  let html=`
  <div style="background:#fff;border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:12px;position:sticky;top:52px;z-index:10">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;color:var(--sub)">Pregunta <strong style="color:var(--txt)">${qi+1}</strong> de <strong style="color:var(--txt)">${qs.length}</strong></span>
      <span style="font-size:13px;color:var(--sub)">${resp_count} respondidas</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">${navDots}</div>
    <div style="display:flex;gap:2px;margin-top:6px">
      <div style="width:${pct}%;height:4px;background:#1B3A6B;border-radius:2px 0 0 2px"></div>
      <div style="flex:1;height:4px;background:#e0e0e0;border-radius:0 2px 2px 0"></div>
    </div>
  </div>`;

  // Show ONLY current question
  html += renderPregunta(qs[qi], qi);

  // Navigation buttons
  const isLast = qi === qs.length-1;
  const answered = S.resp[qi]!==undefined && S.resp[qi]!==null && S.resp[qi]!=='';
  html+=`<div style="display:flex;gap:10px;margin-top:4px">
    ${qi>0?`<button class="btn btn-outline" style="flex:1" onclick="goToQ(${qi-1})">&#8592; Anterior</button>`:'<div style="flex:1"></div>'}
    ${!isLast
      ? `<button class="btn btn-primary" style="flex:2" onclick="goToQ(${qi+1})">${answered?'Siguiente &#8594;':'Omitir &#8594;'}</button>`
      : `<button class="btn btn-success" style="flex:2;font-size:15px" onclick="submitExamen(false)">Enviar examen</button>`
    }
  </div>
  <div style="font-size:12px;color:var(--sub);text-align:center;margin-top:8px">${qs.length-resp_count>0?qs.length-resp_count+' sin responder':'Todas respondidas'}</div>`;

  document.getElementById('main-content').innerHTML=html;
  document.querySelectorAll('.secure-txt').forEach(el=>secureEl(el));
  initDrag();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goToQ(i){
  // Save any open textarea first
  document.querySelectorAll('.secure-txt').forEach(el=>{
    if(el.id&&el.id.startsWith('txt_')){const qi=parseInt(el.id.split('_')[1]);if(el.value.trim())S.resp[qi]=el.value.trim();}
    if(el.id&&el.id.startsWith('bl_')){const p=el.id.split('_');const qi=parseInt(p[1]),bi=parseInt(p[2]);if(!S.resp[qi])S.resp[qi]={};S.resp[qi][bi]=el.value.trim();}
  });
  const qs=S.examen.preguntas||[];
  S.currentQ=Math.max(0,Math.min(i,qs.length-1));
  renderExamen();
}

function renderPregunta(q,i){
  const resp=S.resp[i];
  const answered=resp!==undefined&&resp!==null&&resp!=='';
  let inner='';
  switch(q.tipo){
    case 'multiple':
      const L=['A','B','C','D'];
      inner='<div class="op-list">'+(q.opciones||[]).map((op,oi)=>`
        <button class="op-btn${resp===oi?' selected':''}" onclick="setR(${i},${oi});renderExamen()" style="${resp===oi?'border-width:2.5px;border-color:#1B3A6B;background:#DCE8F5;font-weight:700':''}">
          <div class="op-letra" style="${resp===oi?'background:#1B3A6B;content:\"X\"':''}">${resp===oi?'&#10003;':L[oi]}</div>
          <span>${esc(op)}</span>
        </button>`).join('')+'</div>'; break;
    case 'texto':
      inner=`<div class="secure-area">
        <textarea class="secure-txt" id="txt_${i}" rows="4" placeholder="Escribe tu respuesta aqui..."
          oninput="setR(${i},this.value);updateProg()">${esc(resp||'')}</textarea>
        <span class="secure-icon">sin pegar</span></div>`; break;
    case 'vf':
      inner=`<div class="vf-row">
        <button class="vf-btn${resp==='V'?' sel-v':''}" onclick="setR(${i},'V');renderExamen()">Verdadero</button>
        <button class="vf-btn${resp==='F'?' sel-f':''}" onclick="setR(${i},'F');renderExamen()">Falso</button>
      </div>`; break;
    case 'completar':
      let txt=esc(q.texto||''); let bi=0;
      txt=txt.replace(/___/g,()=>{ const b=bi++; const v=(resp&&resp[b])||'';
        return `<input type="text" class="blank-input secure-txt" id="bl_${i}_${b}" value="${esc(v)}" placeholder="?" oninput="setRBlank(${i},${b},this.value)" maxlength="60">`; });
      inner=`<div class="completar-txt">${txt}</div>`; break;
    case 'ordenar':
      const items=S.ordenItems[i]||q.items||[];
      inner=`<div class="orden-list" id="ord_${i}">`+items.map((it,ii)=>`
        <div class="orden-item" draggable="true" data-q="${i}" data-ii="${ii}">
          <span class="orden-handle">&#8801;</span>
          <div class="orden-pos">${ii+1}</div>
          <span>${esc(it)}</span>
        </div>`).join('')+'</div>'; break;
    case 'escala':
      const lbs=q.etiquetas||['1','2','3','4','5'];
      inner=`<div class="escala-row">`+[1,2,3,4,5].map(n=>`
        <button class="escala-btn${resp===n?' selected':''}" onclick="setR(${i},${n});renderExamen()">
          <div class="escala-num">${n}</div>
          <div class="escala-lbl">${esc(lbs[n-1]||n)}</div>
        </button>`).join('')+'</div>'; break;
  }
  return `<div class="pregunta-card" style="border-color:${answered?'var(--ve)':'var(--brd)'}">
    <div class="pregunta-header">
      <span class="pregunta-num">${i+1}</span>
      <span class="pregunta-txt">${esc(q.texto||'')}</span>
      ${q.puntos?`<span class="pts-badge">${q.puntos} pts</span>`:''}
    </div>${inner}</div>`;
}

function setR(qi,v){S.resp[qi]=v;}
function setRBlank(qi,bi,v){if(!S.resp[qi])S.resp[qi]={};S.resp[qi][bi]=v;}
function updateProg(){
  // In step mode just update answer count in nav
  const qs=S.examen.preguntas||[];
  const n=Object.keys(S.resp).length;
  // Update nav dots to reflect answered state
  qs.forEach((_,i)=>{
    const ans=S.resp[i]!==undefined&&S.resp[i]!==null&&S.resp[i]!=='';
    const active=i===(S.currentQ||0);
    const allDots=document.querySelectorAll('.nav-dots-wrapper>div');
    if(allDots[i]){allDots[i].style.background=active?'#1B3A6B':(ans?'#1B5E20':'#ccc');}
  });
}

function initDrag(){
  document.querySelectorAll('.orden-list').forEach(list=>{
    const qi=parseInt(list.id.split('_')[1]);
    let src=null;
    list.querySelectorAll('.orden-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');});
      item.addEventListener('dragend',()=>item.classList.remove('dragging'));
      item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('dragover');});
      item.addEventListener('dragleave',()=>item.classList.remove('dragover'));
      item.addEventListener('drop',e=>{
        e.preventDefault(); item.classList.remove('dragover');
        if(!src||src===item) return;
        const items=Array.from(list.querySelectorAll('.orden-item'));
        const fi=items.indexOf(src), ti=items.indexOf(item);
        const arr=[...S.ordenItems[qi]];
        const [mv]=arr.splice(fi,1); arr.splice(ti,0,mv);
        S.ordenItems[qi]=arr; S.resp[qi]=[...arr];
        list.innerHTML=arr.map((it,ii)=>`
          <div class="orden-item" style="border-color:var(--ve)" draggable="true" data-q="${qi}" data-ii="${ii}">
            <span class="orden-handle">&#8801;</span>
            <div class="orden-pos">${ii+1}</div><span>${esc(it)}</span>
          </div>`).join('');
        initDrag(); updateProg();
      });
    });
  });
}


// ── AUTO-GRADING ENGINE ────────────────────────────────────────
function normText(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function calcularNota(examen, respuestas){
  const qs = examen.preguntas||[];
  const detalle = [];
  let puntos_auto = 0;
  let puntos_texto_max = 0;
  let puntos_maximo = 0;

  qs.forEach((q, i)=>{
    const pts = q.puntos||0;
    puntos_maximo += pts;
    const resp = respuestas[i];
    const item = {qi:i, tipo:q.tipo, pts_max:pts, pts:0, auto:false, pendiente:false};

    switch(q.tipo){
      case 'multiple':{
        item.auto = true;
        const L=['A','B','C','D'];
        const corrIdx = L.indexOf(q.correcta);
        if(resp===corrIdx) item.pts = pts;
        break;
      }
      case 'vf':{
        item.auto = true;
        if(String(resp)===String(q.correcta)) item.pts = pts;
        break;
      }
      case 'ordenar':{
        item.auto = true;
        const correctOrder = q.items||[];
        const studentOrder = Array.isArray(resp) ? resp : [];
        if(studentOrder.length===0){item.pts=0;break;}
        // Score by position matches
        let matches=0;
        correctOrder.forEach((it,ci)=>{
          if(normText(studentOrder[ci])===normText(it)) matches++;
        });
        // Full marks only if perfect order, partial for partial
        if(matches===correctOrder.length){
          item.pts = pts;
        } else if(matches >= Math.ceil(correctOrder.length/2)){
          item.pts = Math.round(pts * matches / correctOrder.length);
        }
        item.detalle = matches+'/'+correctOrder.length+' en orden correcto';
        break;
      }
      case 'completar':{
        item.auto = true;
        const correctBlanks = q.respuestas||[]; // array of correct answers per blank
        if(correctBlanks.length===0){item.pts=pts;break;} // no key = full marks
        const studentBlanks = resp&&typeof resp==='object' ? resp : {};
        let blancoCorrectos=0;
        correctBlanks.forEach((correct,bi)=>{
          const given = normText(studentBlanks[bi]||'');
          const correctNorm = normText(correct);
          // Accept partial match (at least 60% of correct word)
          if(given===correctNorm || (given.length>3 && correctNorm.includes(given)) || (correctNorm.length>3 && given.includes(correctNorm.substring(0,Math.ceil(correctNorm.length*0.6))))){
            blancoCorrectos++;
          }
        });
        item.pts = Math.round(pts * blancoCorrectos / correctBlanks.length);
        item.detalle = blancoCorrectos+'/'+correctBlanks.length+' blancos correctos';
        break;
      }
      case 'texto':{
        item.pendiente = true;
        puntos_texto_max += pts;
        break;
      }
      case 'escala':
      case 'ordenar_libre':{
        item.auto = true;
        item.pts = resp!==undefined&&resp!==null&&resp!=='' ? pts : 0;
        item.detalle = 'participacion';
        break;
      }
    }

    if(item.auto) puntos_auto += item.pts;
    detalle.push(item);
  });

  return {puntos_auto, puntos_texto_max, puntos_maximo, detalle};
}
async function submitExamen(auto){
  if(!auto){
    const qs=S.examen.preguntas||[];
    const sin=qs.length-Object.keys(S.resp).length;
    if(sin>0&&!confirm('Tienes '+sin+' pregunta(s) sin responder. ¿Enviar de todas formas?')) return;
  }
  stopTimer();
  // Collect remaining text
  document.querySelectorAll('.secure-txt').forEach(el=>{
    if(el.id&&el.id.startsWith('txt_')){const qi=parseInt(el.id.split('_')[1]);if(el.value.trim())S.resp[qi]=el.value.trim();}
    if(el.id&&el.id.startsWith('bl_')){const p=el.id.split('_');const qi=parseInt(p[1]),bi=parseInt(p[2]);if(!S.resp[qi])S.resp[qi]={};S.resp[qi][bi]=el.value.trim();}
  });
  // Auto-grade
  const {puntos_auto, puntos_texto_max, puntos_maximo, detalle} = calcularNota(S.examen, S.resp);
  const tiene_texto = puntos_texto_max > 0;

  const {error}=await sb.from('respuestas_examenes').insert({
    examen_id:S.examen.id, nombre:S.est.nombre, numero_orden:parseInt(S.est.orden)||0,
    grado:S.est.grado, seccion:S.est.seccion, respuestas:S.resp, tiempo_usado_seg:tiempoUsado(),
    puntos_auto, puntos_texto:null, puntos_total:tiene_texto?null:puntos_auto,
    puntos_maximo, detalle_notas:detalle, texto_revisado:!tiene_texto
  });
  if(error){toast('Error al guardar: '+error.message,4000);return;}
  S.view='enviado'; render();
}

function showAdminLogin(){
  if(S.adminAuth){S.view='admin';render();return;}
  S.view='admin-login'; render();
}
function renderAdminLogin(){
  document.getElementById('main-content').innerHTML=`
  <div class="card" style="max-width:360px;margin:40px auto">
    <h2>Acceso administrador</h2>
    <label for="pin-in">PIN</label>
    <input type="password" id="pin-in" maxlength="10" placeholder="Ingresa el PIN" onkeydown="if(event.key==='Enter')checkPin()">
    <div class="btn-row">
      <button class="btn btn-outline" onclick="S.view='inicio';render()">Cancelar</button>
      <button class="btn btn-primary" onclick="checkPin()">Ingresar</button>
    </div>
  </div>`;
}
async function checkPin(){
  const pin=document.getElementById('pin-in').value;
  const hash=await sha256(pin);
  const {data}=await sb.from('admin_config').select('pin_hash').single();
  if(data&&data.pin_hash===hash){
    S.adminAuth=true;
    S.pinHash=hash; // Store for RPC calls
    document.getElementById('btn-admin').textContent='Salir';
    document.getElementById('btn-admin').onclick=adminLogout;
    S.view='admin'; render();
  } else { toast('PIN incorrecto'); }
}
function adminLogout(){ S.adminAuth=false; S.view='inicio'; document.getElementById('btn-admin').textContent='Admin'; document.getElementById('btn-admin').onclick=showAdminLogin; render(); }
async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function toggleActivo(id,actual){
  const {error} = await rpcAdmin('admin_toggle_examen',{p_id:id, p_activo:!actual});
  if(error){toast('Error: '+error.message,4000);return;}
  toast(actual?'Examen cerrado':'Examen abierto');
  S.adminTab='examenes'; renderAdmin();
}
async function eliminarExamen(id,titulo){
  if(!confirm('Eliminar "'+titulo+'" y TODAS sus respuestas? Esta accion no se puede deshacer.')) return;
  const {error} = await rpcAdmin('admin_delete_examen',{p_id:id});
  if(error){toast('Error: '+error.message,4000);return;}
  toast('Eliminado'); renderAdmin();
}
async function editarExamen(id){
  const {data}=await sb.from('examenes').select('*').eq('id',id).single();
  S.adminExamen=data; S.qBuilders=[...(data.preguntas||[])];
  S.view='admin-crear'; render();
}

async function procesarCSV(){
  const txt=document.getElementById('csv-input').value.trim();
  if(!txt){toast('Pega el contenido CSV');return;}
  const lines=txt.split('\n').filter(l=>l.trim());
  const rows=[];
  const errores=[];
  lines.forEach((line,i)=>{
    const parts=line.split(',').map(p=>p.trim());
    if(parts.length<4){errores.push('Linea '+(i+1)+': formato incorrecto');return;}
    const [grado,seccion,num,...rest]=parts;
    const nombre=rest.join(' ').trim();
    const numero=parseInt(num);
    if(!grado||!seccion||!numero||!nombre){errores.push('Linea '+(i+1)+': datos incompletos');return;}
    rows.push({grado,seccion:seccion.toUpperCase(),numero_orden:numero,nombre,activo:true});
  });
  if(errores.length>0){toast(errores.length+' errores: '+errores[0],4000);return;}
  const {error}=await rpcAdmin('admin_upsert_estudiantes',{p_filas:rows});
  if(error){toast('Error: '+error.message,4000);return;}
  toast(rows.length+' estudiantes importados');
  document.getElementById('import-area').style.display='none';
  S.adminTab='lista'; renderAdmin();
}
async function guardarEstudiante(){
  const grado=document.getElementById('ae-grado').value;
  const seccion=document.getElementById('ae-sec').value;
  const orden=parseInt(document.getElementById('ae-num').value)||0;
  const nombre=document.getElementById('ae-nombre').value.trim();
  if(!nombre||orden<1){toast('Completa todos los campos');return;}
  const {error}=await rpcAdmin('admin_upsert_estudiantes',{p_filas:[{grado,seccion,numero_orden:orden,nombre}]});
  if(error){toast('Error: '+error.message);return;}
  toast('Estudiante guardado');
  document.getElementById('add-est-area').style.display='none';
  S.adminTab='lista'; renderAdmin();
}

async function revisarTexto(respId){

  const ex = S.adminExamen;
  const qs = ex.preguntas||[];
  const pendientes = (resp.detalle_notas||[]).filter(d=>d.pendiente);

  let html = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:20px">
    <div style="max-width:680px;margin:0 auto;background:#fff;border-radius:12px;padding:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0;color:#1B3A6B">Revisar respuestas de texto</h2>
        <button class="btn btn-outline btn-sm" onclick="cerrarRevision()">Cerrar</button>
      </div>
      <div style="background:#EEF4FB;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px">
        <strong>${esc(resp.nombre)}</strong> · ${esc(resp.grado)} ${esc(resp.seccion)} · Orden ${resp.numero_orden}<br>
        Puntos auto: <strong>${resp.puntos_auto??0}</strong> · Puntos texto: <strong style="color:#E65100">pendiente</strong> · Maximo: <strong>${resp.puntos_maximo}</strong>
      </div>`;

  pendientes.forEach(d=>{
    const q = qs[d.qi];
    const respTxt = resp.respuestas[d.qi]||'';
    html += `<div style="border:1px solid #E0E0E0;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:12px;color:#555;margin-bottom:4px">Pregunta ${d.qi+1} · ${q.puntos} pts</div>
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">${esc(q.texto)}</div>
      <div style="background:#F5F5F5;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px;min-height:60px">${esc(respTxt)||'<em style="color:#aaa">Sin respuesta</em>'}</div>
      ${q.rubrica?`<div style="background:#FFF8DC;border-radius:6px;padding:8px 10px;font-size:12px;color:#7B5800;margin-bottom:10px"><strong>Rubrica:</strong> ${esc(q.rubrica)}</div>`:''}
      <div style="display:flex;align-items:center;gap:10px">
        <label style="font-size:13px;font-weight:700;color:#555;white-space:nowrap">Puntos (max ${q.puntos}):</label>
        <input type="number" id="pts_${d.qi}" min="0" max="${q.puntos}" value="0" style="width:70px;font-size:15px;font-weight:700">
        <div style="display:flex;gap:5px">
          ${[0, Math.round(q.puntos*0.25), Math.round(q.puntos*0.5), Math.round(q.puntos*0.75), q.puntos].map(v=>
            `<button class="btn btn-xs btn-gray" onclick="document.getElementById('pts_${d.qi}').value=${v}">${v}</button>`
          ).join('')}
        </div>
      </div>
    </div>`;
  });

  html += `<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <div id="revision-error" style="display:none;background:#FFEBEE;color:#B71C1C;border-radius:8px;padding:8px 12px;font-size:13px;flex:1"></div>
      <button class="btn btn-outline" onclick="cerrarRevision()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarRevision('${respId}',${JSON.stringify(pendientes.map(d=>d.qi))})">Guardar notas</button>
    </div>
  </div></div>`;

  const overlay = document.createElement('div');
  overlay.id='revision-overlay';
  overlay.innerHTML=html;
  document.body.appendChild(overlay);
}

function cerrarRevision(){
  const el=document.getElementById('revision-overlay');
  if(el) el.remove();
}

async function guardarRevision(respId, qIndices){
  // Button feedback
  const btn = document.querySelector('#revision-overlay .btn-primary');
  if(btn){ btn.disabled=true; btn.textContent='Guardando...'; }

  let ptsTxt=0;
  const resp = S.respuestas.find(r=>r.id===respId);
  if(!resp){ toast('Error: respuesta no encontrada',4000); return; }

  const detalle = JSON.parse(JSON.stringify(resp.detalle_notas||[]));
  qIndices.forEach(qi=>{
    const input = document.getElementById('pts_'+qi);
    const val = input ? (parseInt(input.value)||0) : 0;
    ptsTxt += val;
    const item = detalle.find(d=>d.qi===qi);
    if(item){ item.pts=val; item.pendiente=false; }
    else { detalle.push({qi, pts:val, pendiente:false, auto:false}); }
  });

  const ptTotal = (resp.puntos_auto||0) + ptsTxt;

  const {error} = await rpcAdmin('admin_guardar_nota',{
    p_resp_id:   respId,
    p_pts_texto: ptsTxt,
    p_pts_total: ptTotal,
    p_detalle:   detalle
  });

  if(error){
    console.error('RPC error:', error);
    if(btn){ btn.disabled=false; btn.textContent='Guardar notas'; }
    const errDiv = document.getElementById('revision-error');
    if(errDiv){ errDiv.style.display='block'; errDiv.textContent='Error: '+error.message; }
    toast('Error al guardar',4000);
    return;
  }

  cerrarRevision();
  toast('Nota guardada: '+ptTotal+'/'+resp.puntos_maximo+' pts');
  await verRespuestas(S.adminExamen.id);
}

function descargarExcel(){
  const ex=S.adminExamen; const qs=ex.preguntas||[]; const resps=S.respuestas;
  const wb=XLSX.utils.book_new();
  // Respuestas
  const h1=['Nombre','Orden','Seccion','Grado','Pts Auto','Pts Texto','Pts Total','Maximo','%','Revisado','Tiempo(seg)','Enviado'];
  qs.forEach((q,i)=>h1.push('P'+(i+1)+' ['+q.tipo+']('+q.puntos+'pts): '+(q.texto||'').substring(0,35)));
  const rows=[h1];
  resps.forEach(r=>{
    const pct=(r.puntos_maximo&&r.puntos_total!=null)?Math.round(r.puntos_total/r.puntos_maximo*100)+'%':'—';
    const row=[r.nombre,r.numero_orden,r.seccion,r.grado,
      r.puntos_auto??'—',r.puntos_texto??'—',r.puntos_total??'—',r.puntos_maximo??'—',pct,
      r.texto_revisado?'Si':'Pendiente',r.tiempo_usado_seg||0,(r.submitted_at||'').substring(0,16)];
    qs.forEach((_,qi)=>{ const v=r.respuestas[qi]; row.push(v===undefined?'':(typeof v==='object'?JSON.stringify(v):String(v))); });
    rows.push(row);
  });
  const ws1=XLSX.utils.aoa_to_sheet(rows);
  ws1['!cols']=h1.map((_,i)=>({wch:i<6?16:45}));
  XLSX.utils.book_append_sheet(wb,ws1,'Respuestas');
  // Rubrica
  const h2=['#','Tipo','Pregunta','Puntos','Criterios'];
  const rub=[h2,...qs.map((q,i)=>[i+1,q.tipo,q.texto||'',q.puntos||0,q.rubrica||(q.tipo==='vf'?'Correcta: '+q.correcta:q.tipo==='multiple'?'Correcta: '+q.correcta:'—')])];
  if(ex.rubrica_txt) rub.push(['','','Rubrica general:','',ex.rubrica_txt]);
  const ws2=XLSX.utils.aoa_to_sheet(rub);
  ws2['!cols']=[{wch:4},{wch:14},{wch:50},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb,ws2,'Rubrica');
  const fecha=new Date().toISOString().substring(0,10);
  XLSX.writeFile(wb,ex.titulo+'_'+ex.grado+'_P'+ex.periodo+'_'+fecha+'.xlsx');
  toast('Excel descargado');
}

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">

          <select id="f-grado">${GRADOS.map(g=>`<option ${ex?.grado===g?'selected':''}>${g}</option>`).join('')}</select></div>
        <div><label>Periodo</label>
          <select id="f-periodo">${[1,2,3,4].map(p=>`<option ${ex?.periodo===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div><label>Tiempo (min)</label>
          <input type="number" id="f-tiempo" value="${ex?.tiempo_minutos||0}" min="0" max="180"></div>
      </div>
      <label for="f-desc">Descripcion</label>
      <input type="text" id="f-desc" value="${esc(ex?.descripcion||'')}">
      <label for="f-instr">Instrucciones para el estudiante</label>
      <textarea id="f-instr">${esc(ex?.instrucciones||'')}</textarea>
      <label for="f-rubrica">Rubrica general (para el docente / analisis IA)</label>
      <textarea id="f-rubrica" rows="2">${esc(ex?.rubrica_txt||'')}</textarea>
    </div>
    <div class="form-sec">
      <div class="form-sec-title">Control de acceso</div>
      <label>Secciones autorizadas (deja vacio = todas)</label>
      <div class="sec-chips" id="sec-chips">
        ${SECCIONES.map(s=>`<div class="sec-chip${secs.includes(s)?' active':''}" id="chip_${s}" onclick="toggleChip('${s}')">${s}</div>`).join('')}
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="f-validar" ${ex?.validar_lista?'checked':''} style="width:auto">
        <label style="margin:0;font-size:14px">Verificar estudiantes contra la lista del curso</label>
      </div>
    </div>
    <div class="form-sec">
      <div class="form-sec-title">Preguntas</div>
      <div id="q-list"></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:10px">
        <button class="btn btn-outline btn-sm" onclick="addQ('multiple')">+ Opcion multiple</button>
        <button class="btn btn-outline btn-sm" onclick="addQ('texto')">+ Texto libre</button>
        <button class="btn btn-outline btn-sm" onclick="addQ('vf')">+ Verdadero/Falso</button>
        <button class="btn btn-outline btn-sm" onclick="addQ('completar')">+ Completar</button>
        <button class="btn btn-outline btn-sm" onclick="addQ('ordenar')">+ Ordenar</button>
        <button class="btn btn-outline btn-sm" onclick="addQ('escala')">+ Escala 1-5</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="S.qBuilders=[];S.view='admin';render()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarExamen()">Guardar examen</button>
    </div>
  </div>`;
  document.getElementById('main-content').innerHTML=html;
  renderQBuilders();
}

let _secActivas=[];
function toggleChip(s){
  const chip=document.getElementById('chip_'+s);
  if(chip.classList.contains('active')){chip.classList.remove('active');}
  else{chip.classList.add('active');}
}
function getSecsActivas(){
  return SECCIONES.filter(s=>{const c=document.getElementById('chip_'+s);return c&&c.classList.contains('active');});
}

function addQ(tipo){
  const defaults={
    multiple:{tipo:'multiple',texto:'',opciones:['','','',''],correcta:'A',puntos:5},
    texto:{tipo:'texto',texto:'',puntos:10,rubrica:''},
    vf:{tipo:'vf',texto:'',correcta:'V',puntos:5},
    completar:{tipo:'completar',texto:'La vida de Jesus es ___ y su mision fue ___',puntos:10},
    ordenar:{tipo:'ordenar',texto:'Ordena los siguientes elementos:',items:['Elemento 1','Elemento 2','Elemento 3'],puntos:10},
    escala:{tipo:'escala',texto:'',etiquetas:['Nada','Poco','Regular','Bastante','Mucho'],puntos:5}
  };
  S.qBuilders.push({...defaults[tipo]}); renderQBuilders();
}

function renderQBuilders(){
  const el=document.getElementById('q-list');
  if(!el) return;
  const TN={multiple:'Opcion multiple',texto:'Texto libre',vf:'Verdadero/Falso',completar:'Completar la frase',ordenar:'Ordenar elementos',escala:'Escala 1-5'};
  el.innerHTML=S.qBuilders.map((q,i)=>{
    let extra='';
    if(q.tipo==='multiple'){
      extra='<div style="margin-top:8px">'+['A','B','C','D'].map((L,oi)=>`
        <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">
          <span style="width:20px;font-weight:700;font-size:13px">${L}</span>
          <input type="text" value="${esc((q.opciones||[])[oi]||'')}" placeholder="Opcion ${L}" oninput="S.qBuilders[${i}].opciones[${oi}]=this.value" style="flex:1;font-size:13px">
          <input type="radio" name="cor_${i}" ${q.correcta===L?'checked':''} onchange="S.qBuilders[${i}].correcta='${L}'" title="Correcta">
        </div>`).join('')+'<small style="color:var(--sub)">El circulo marca la opcion correcta</small></div>';
    } else if(q.tipo==='vf'){
      extra=`<div style="margin-top:8px;display:flex;gap:12px;align-items:center">
        <span style="font-size:12px;color:var(--sub)">Correcta:</span>
        <label><input type="radio" name="vf_${i}" ${q.correcta==='V'?'checked':''} onchange="S.qBuilders[${i}].correcta='V'"> Verdadero</label>
        <label><input type="radio" name="vf_${i}" ${q.correcta==='F'?'checked':''} onchange="S.qBuilders[${i}].correcta='F'"> Falso</label>
      </div>`;
    } else if(q.tipo==='ordenar'){
      extra=`<div style="margin-top:6px"><label style="font-size:12px">Items (uno por linea — el orden que escribas es el CORRECTO):</label>
        <textarea rows="4" style="font-size:13px" oninput="S.qBuilders[${i}].items=this.value.split('\\n').filter(s=>s.trim())">${esc((q.items||[]).join('\n'))}</textarea></div>`;
    } else if(q.tipo==='completar'){
      const respArr=(q.respuestas||[]).join('\n');
      extra=`<small style="color:var(--sub);display:block;margin-top:4px">Usa ___ para los espacios en blanco.</small>
        <div style="margin-top:6px"><label style="font-size:12px;color:#1B5E20;font-weight:700">Respuestas correctas (una por linea, en orden):</label>
        <textarea rows="3" style="font-size:12px;color:#1B5E20;border-color:#A5D6A7" placeholder="autonomia&#10;beneficencia&#10;no maleficencia" oninput="S.qBuilders[${i}].respuestas=this.value.split('\\n').filter(s=>s.trim())">${esc(respArr)}</textarea>
        <small style="color:#1B5E20">Deja vacio si no hay respuesta exacta. Acepta variaciones de tildes.</small></div>`;
    } else if(q.tipo==='texto'){
      extra=`<div style="margin-top:6px"><label style="font-size:12px">Criterios de evaluacion (rubrica):</label>
        <textarea rows="2" style="font-size:13px" placeholder="Excelente: ... Satisfactorio: ..." oninput="S.qBuilders[${i}].rubrica=this.value">${esc(q.rubrica||'')}</textarea></div>`;
    } else if(q.tipo==='escala'){
      extra=`<div style="margin-top:6px"><label style="font-size:12px">Etiquetas 1-5 (separadas por coma):</label>
        <input type="text" style="font-size:13px" value="${esc((q.etiquetas||[]).join(','))}" placeholder="Nada,Poco,Regular,Bastante,Mucho" oninput="S.qBuilders[${i}].etiquetas=this.value.split(',').map(s=>s.trim())"></div>`;
    }
    return `<div class="q-builder">
      <span class="q-type-pill">${TN[q.tipo]}</span>
      <button class="remove-q" onclick="S.qBuilders.splice(${i},1);renderQBuilders()">Quitar</button>
      <label style="font-size:12px">Pregunta ${i+1}</label>
      <textarea rows="2" style="font-size:13px" oninput="S.qBuilders[${i}].texto=this.value">${esc(q.texto||'')}</textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
        <label style="font-size:12px;margin:0;flex-shrink:0">Puntos:</label>
        <input type="number" value="${q.puntos||5}" min="1" max="100" style="width:65px;font-size:13px" oninput="S.qBuilders[${i}].puntos=parseInt(this.value)||5">
      </div>${extra}
    </div>`;
  }).join('');
}

async function guardarExamen(){
  const titulo=document.getElementById('f-titulo').value.trim();
  if(!titulo){toast('Escribe un titulo');return;}
  if(S.qBuilders.length===0){toast('Agrega al menos una pregunta');return;}
  const payload={
    titulo,
    grado:document.getElementById('f-grado').value,
    periodo:parseInt(document.getElementById('f-periodo').value)||1,
    tiempo_minutos:parseInt(document.getElementById('f-tiempo').value)||0,
    descripcion:document.getElementById('f-desc').value.trim(),
    instrucciones:document.getElementById('f-instr').value.trim(),
    rubrica_txt:document.getElementById('f-rubrica').value.trim(),
    preguntas:[...S.qBuilders],
    secciones_activas:getSecsActivas(),
    validar_lista:document.getElementById('f-validar').checked,
    updated_at:new Date().toISOString()
  };
  const {error} = await rpcAdmin('admin_upsert_examen',{
    p_id: S.adminExamen ? S.adminExamen.id : null,
    p_datos: payload
  });
  if(error){toast('Error: '+error.message,4000);return;}
  S.qBuilders=[];
  toast(S.adminExamen?'Examen actualizado':'Examen creado');
  S.adminExamen=null; S.view='admin'; renderAdmin();
}



// ── RPC ADMIN HELPER ──────────────────────────────────────────
async function rpcAdmin(fn, params){
  const {data, error} = await sb.rpc(fn, {p_pin_hash: S.pinHash, ...params});
  if(error) return {error};
  if(data && data.error) return {error: {message: data.error}};
  return {data};
}
// ── IMPORT JSON ────────────────────────────────────────────────
function mostrarImportJSON(){
  const a=document.getElementById('import-json-area');
  if(a) a.style.display=a.style.display==='none'?'block':'none';
}
async function procesarImportJSON(){
  const txt=document.getElementById('json-input').value.trim();
  if(!txt){toast('Pega el JSON del examen');return;}
  let data;
  try{ data=JSON.parse(txt); }
  catch(e){ toast('JSON invalido: '+e.message,4000); return; }
  if(!data.titulo||!Array.isArray(data.preguntas)){toast('El JSON no tiene el formato correcto (titulo + preguntas)');return;}
  const payload={
    titulo:data.titulo,
    descripcion:data.descripcion||'',
    grado:data.grado||'',
    periodo:parseInt(data.periodo)||0,
    tiempo_minutos:parseInt(data.tiempo_minutos)||0,
    instrucciones:data.instrucciones||'',
    rubrica_txt:data.rubrica_txt||'',
    preguntas:data.preguntas,
    secciones_activas:data.secciones_activas||[],
    validar_lista:data.validar_lista||false,
    activo:false,
    updated_at:new Date().toISOString()
  };
  const {error}=await sb.from('examenes').insert(payload);
  if(error){toast('Error al importar: '+error.message,4000);return;}
  toast('Examen importado: '+data.titulo);
  document.getElementById('import-json-area').style.display='none';
  document.getElementById('json-input').value='';
  S.adminTab='examenes'; renderAdmin();
}

// ── EXPORT WORD ────────────────────────────────────────────────
function exportarWord(){
  const ex=S.adminExamen;
  const qs=ex.preguntas||[];
  const TIPO_LABEL={multiple:'Opcion multiple',texto:'Respuesta abierta',vf:'Verdadero / Falso',completar:'Completar la frase',ordenar:'Ordenar elementos',escala:'Escala 1-5'};
  const LETRAS=['A','B','C','D'];
  let doc='';
  // Header
  doc+='EXAMEN\n';
  doc+=ex.titulo+'\n';
  doc+=ex.grado+' | Periodo '+ex.periodo+(ex.tiempo_minutos>0?' | Tiempo: '+ex.tiempo_minutos+' min':'')+'\n';
  doc+='\n';
  // Student info
  doc+='Nombre: _________________________________________________\n';
  doc+='Numero de orden: _____ Seccion: _____ Grado: _____\n';
  doc+='Fecha: ___________________\n';
  doc+='\n';
  if(ex.instrucciones){
    doc+='INSTRUCCIONES: '+ex.instrucciones+'\n\n';
  }
  doc+='='.repeat(60)+'\n\n';
  // Questions
  let totalPts=0;
  qs.forEach((q,i)=>{
    const pts=q.puntos||0;
    totalPts+=pts;
    doc+=(i+1)+'. ['+TIPO_LABEL[q.tipo]+' | '+pts+' pts]\n';
    doc+=q.texto+'\n\n';
    if(q.tipo==='multiple'){
      (q.opciones||[]).forEach((op,oi)=>{
        doc+='   ('+LETRAS[oi]+') '+op+'\n';
      });
      doc+='\n   Mi respuesta: ( )A  ( )B  ( )C  ( )D\n';
    } else if(q.tipo==='vf'){
      doc+='   ( ) Verdadero     ( ) Falso\n';
    } else if(q.tipo==='completar'){
      doc+='   [Completa los espacios en blanco en el texto]\n';
    } else if(q.tipo==='ordenar'){
      doc+='   Ordena los elementos del 1 al '+(q.items||[]).length+':\n';
      (q.items||[]).forEach(it=>{ doc+='   ( ) '+it+'\n'; });
    } else if(q.tipo==='escala'){
      const lbs=q.etiquetas||['1','2','3','4','5'];
      doc+='   Marca con X:\n';
      doc+='   [ ] 1-'+lbs[0]+'  [ ] 2-'+lbs[1]+'  [ ] 3-'+lbs[2]+'  [ ] 4-'+lbs[3]+'  [ ] 5-'+lbs[4]+'\n';
    } else if(q.tipo==='texto'){
      doc+='   ________________________________________________________________\n';
      doc+='   ________________________________________________________________\n';
      doc+='   ________________________________________________________________\n';
      doc+='   ________________________________________________________________\n';
      doc+='   ________________________________________________________________\n';
      doc+='   ________________________________________________________________\n';
    }
    doc+='\n';
  });
  doc+='='.repeat(60)+'\n';
  doc+='TOTAL: '+totalPts+' puntos\n\n';
  // Rubrica
  if(ex.rubrica_txt||qs.some(q=>q.rubrica)){
    doc+='RUBRICA (uso del docente)\n';
    doc+='-'.repeat(40)+'\n';
    if(ex.rubrica_txt) doc+='General: '+ex.rubrica_txt+'\n\n';
    qs.forEach((q,i)=>{
      if(q.rubrica) doc+='P'+(i+1)+': '+q.rubrica+'\n';
      else if(q.tipo==='multiple'||q.tipo==='vf') doc+='P'+(i+1)+': Respuesta correcta: '+q.correcta+'\n';
    });
  }
  // Download as .txt (opens in Word as plain text, fully editable)
  const blob=new Blob([doc],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const fecha=new Date().toISOString().substring(0,10);
  a.download=ex.titulo+'_'+ex.grado+'_P'+ex.periodo+'_'+fecha+'.txt';
  a.click();
  URL.revokeObjectURL(url);
  toast('Documento descargado');
}

// ── INIT ───────────────────────────────────────────────────────
render();
</script>
