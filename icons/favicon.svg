<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2E5FA3"/>
      <stop offset="100%" stop-color="#1B3A6B"/>
    </radialGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Hemisferio izquierdo -->
  <path d="M15 11
           C14 8.5 11.5 7.5 9 8.5
           C6.5 9.5 5 12 5.5 14.5
           C6 17 7.5 19.5 10 20.5
           C12 21.2 14 20.5 15 19.5 Z"
        fill="#00D4FF"/>

  <!-- Hemisferio derecho -->
  <path d="M17 11
           C18 8.5 20.5 7.5 23 8.5
           C25.5 9.5 27 12 26.5 14.5
           C26 17 24.5 19.5 22 20.5
           C20 21.2 18 20.5 17 19.5 Z"
        fill="#00D4FF"/>

  <!-- Puente entre hemisferios (parte superior) -->
  <path d="M15 11 C15.3 9.8 16.7 9.8 17 11" fill="#00D4FF"/>

  <!-- Tronco encefálico -->
  <path d="M13.5 20.5 C13.2 22.5 14.2 24 16 24 C17.8 24 18.8 22.5 18.5 20.5"
        fill="#00D4FF"/>

  <!-- Surcos / pliegues -->
  <g fill="none" stroke="#0A2240" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cisura central -->
    <line x1="16" y1="11" x2="16" y2="19.5" stroke-width="1.3"/>
    <!-- Pliegues hemisferio izquierdo -->
    <path d="M7 13 C8.5 11.8 10.5 12.3 11.5 13.8" stroke-width="1.1"/>
    <path d="M6.5 16.5 C8 15.3 10.5 15.8 12 17.3" stroke-width="1.1"/>
    <!-- Pliegues hemisferio derecho -->
    <path d="M25 13 C23.5 11.8 21.5 12.3 20.5 13.8" stroke-width="1.1"/>
    <path d="M25.5 16.5 C24 15.3 21.5 15.8 20 17.3" stroke-width="1.1"/>
  </g>
</svg>
